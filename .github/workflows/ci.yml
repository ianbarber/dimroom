name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: swift test (Packages)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version || true
          swift --version

      - name: Test all packages
        run: |
          if [ ! -d Packages ]; then
            echo "No Packages/ directory yet — skipping. (Stage 0.1 will add it.)"
            exit 0
          fi
          set -e
          for pkg in Packages/*/; do
            if [ -f "$pkg/Package.swift" ]; then
              echo "::group::swift test $pkg"
              (cd "$pkg" && swift test --parallel)
              echo "::endgroup::"
            fi
          done

  build-app:
    name: build app target
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build (placeholder until Stage 0.3)
        run: |
          if [ ! -d App/Dimroom.xcodeproj ]; then
            echo "No app target yet — skipping. (Stage 0.3 will add it.)"
            exit 0
          fi
          xcodebuild \
            -project App/Dimroom.xcodeproj \
            -scheme Dimroom \
            -destination 'platform=macOS' \
            -configuration Debug \
            build | xcpretty || true

  harness-smoke:
    name: harness smoke flow
    runs-on: macos-14
    needs: [swift-test, build-app]
    steps:
      - uses: actions/checkout@v4
      - name: Run harness smoke (placeholder until Stage 0.3)
        run: |
          if [ ! -x bin/harness-smoke.sh ]; then
            echo "No harness smoke script yet — skipping. (Stage 0.3 will add it.)"
            exit 0
          fi
          bin/harness-smoke.sh
