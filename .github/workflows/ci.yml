name: CI

# -------------------------------------------------------------------
# CI is DISABLED to avoid expensive macOS runner minutes.
#
# All verification (swift test, snapshot tests, harness smoke flows)
# runs locally as part of the agent loop's IMPLEMENT stage — see
# .claude/prompts/implement.md steps 6–7.
#
# To re-enable, uncomment the `on:` block below and delete the
# `on: workflow_dispatch` line.
# -------------------------------------------------------------------

on:
  workflow_dispatch:  # manual-only — no automatic triggers

# on:
#   pull_request:
#   push:
#     branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: swift test (Packages)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version || true
          swift --version

      - name: Test all packages
        run: bin/test-all.sh

  build-app:
    name: build app target
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build app (SPM)
        run: |
          if [ ! -f App/Package.swift ]; then
            echo "No app target yet — skipping."
            exit 0
          fi
          swift build --package-path App

  harness-smoke:
    name: harness smoke flow
    runs-on: macos-14
    needs: [swift-test, build-app]
    steps:
      - uses: actions/checkout@v4
      - name: Run harness smoke
        run: |
          if [ ! -x bin/harness-smoke.sh ]; then
            echo "No harness smoke script yet — skipping."
            exit 0
          fi
          bin/harness-smoke.sh
      - name: Run harness import flow
        run: |
          if [ ! -x bin/harness-import-flow.sh ]; then
            echo "No harness import flow script yet — skipping."
            exit 0
          fi
          bin/harness-import-flow.sh
      - name: Run harness library flow
        run: |
          if [ ! -x bin/harness-library-flow.sh ]; then
            echo "No harness library flow script yet — skipping."
            exit 0
          fi
          bin/harness-library-flow.sh
      - name: Run harness import UI flow
        run: |
          if [ ! -x bin/harness-import-ui-flow.sh ]; then
            echo "No harness import UI flow script yet — skipping."
            exit 0
          fi
          bin/harness-import-ui-flow.sh
      - name: Run harness loupe flow
        run: |
          if [ ! -x bin/harness-loupe-flow.sh ]; then
            echo "No harness loupe flow script yet — skipping."
            exit 0
          fi
          bin/harness-loupe-flow.sh
      - name: Run harness copypaste flow
        run: |
          if [ ! -x bin/harness-copypaste-flow.sh ]; then
            echo "No harness copypaste flow script yet — skipping."
            exit 0
          fi
          bin/harness-copypaste-flow.sh
      - name: Run harness navigation flow
        run: |
          if [ ! -x bin/harness-navigation-flow.sh ]; then
            echo "No harness navigation flow script yet — skipping."
            exit 0
          fi
          bin/harness-navigation-flow.sh
      - name: Run harness multi-select delete flow
        run: |
          if [ ! -x bin/harness-multi-select-delete-flow.sh ]; then
            echo "No harness multi-select-delete flow script yet — skipping."
            exit 0
          fi
          bin/harness-multi-select-delete-flow.sh
      - name: Run harness zoom flow
        run: |
          if [ ! -x bin/harness-zoom-flow.sh ]; then
            echo "No harness zoom flow script yet — skipping."
            exit 0
          fi
          bin/harness-zoom-flow.sh
