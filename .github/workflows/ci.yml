name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: swift test (Packages)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version || true
          swift --version

      - name: Test all packages
        run: bin/test-all.sh

  build-app:
    name: build app target
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build app (SPM)
        run: |
          if [ ! -f App/Package.swift ]; then
            echo "No app target yet — skipping."
            exit 0
          fi
          swift build --package-path App

  harness-smoke:
    name: harness smoke flow
    runs-on: macos-14
    needs: [swift-test, build-app]
    steps:
      - uses: actions/checkout@v4
      - name: Run harness smoke
        run: |
          if [ ! -x bin/harness-smoke.sh ]; then
            echo "No harness smoke script yet — skipping."
            exit 0
          fi
          bin/harness-smoke.sh
      - name: Run harness import flow
        run: |
          if [ ! -x bin/harness-import-flow.sh ]; then
            echo "No harness import flow script yet — skipping."
            exit 0
          fi
          bin/harness-import-flow.sh
