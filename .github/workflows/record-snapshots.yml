name: Record snapshots

# Regenerates Layer B snapshot goldens on the GitHub `macos-14` runner.
# SwiftUI / SF Symbol / Core Image rendering drifts enough between
# personal Macs and the CI image that goldens captured locally can fail
# on CI. Running this workflow records fresh goldens on a CI-equivalent
# machine and uploads them as an artifact; the developer downloads the
# artifact, replaces the committed PNGs, and pushes.
#
# Manual-only (workflow_dispatch) — do not run on push/PR.

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to record snapshots for"
        required: true
        default: "UI"
        type: choice
        options:
          - UI

jobs:
  record:
    name: Record ${{ inputs.package }} snapshots
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Record snapshots
        env:
          DIMROOM_RECORD_SNAPSHOTS: "1"
        run: |
          set -e
          cd "Packages/${{ inputs.package }}"
          # Recording mode always fails the tests that wrote a golden,
          # so ignore the exit code — the artifact upload below is what
          # matters.
          swift test || true

      - name: Upload generated snapshots
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-snapshots
          path: Packages/${{ inputs.package }}/Tests/**/__Snapshots__/**/*.png
          if-no-files-found: error
          retention-days: 7
