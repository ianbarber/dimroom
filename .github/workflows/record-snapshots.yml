name: Record snapshots

# Regenerates Layer B snapshot goldens on the GitHub `macos-14` runner.
# SwiftUI / SF Symbol / Core Image rendering drifts enough between
# personal Macs and the CI image that goldens captured locally can fail
# on CI. Running this workflow records fresh goldens on a CI-equivalent
# machine and uploads them as an artifact; the developer downloads the
# artifact, replaces the committed PNGs, and pushes.
#
# Two triggers:
#   - workflow_dispatch, once this file lands on the default branch.
#   - push to this file on any branch, as a bootstrap path so feature
#     branches can run it before their PR merges.

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to record snapshots for"
        required: true
        default: "UI"
        type: choice
        options:
          - UI
  # Also trigger when the workflow file itself is touched on any
  # branch. This is the bootstrap path: workflow_dispatch can only
  # fire workflows that exist on the default branch, so before this
  # file lands on main the only way to run it is to push a change to
  # the file on the feature branch. Safe because the path filter
  # guarantees nothing else triggers it.
  push:
    paths:
      - '.github/workflows/record-snapshots.yml'

jobs:
  record:
    name: Record UI snapshots
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Record snapshots
        env:
          DIMROOM_RECORD_SNAPSHOTS: "1"
        run: |
          set -e
          cd Packages/UI
          # Recording mode always fails the tests that wrote a golden,
          # so ignore the exit code — the artifact upload below is what
          # matters.
          swift test || true

      - name: Upload generated snapshots
        uses: actions/upload-artifact@v4
        with:
          name: UI-snapshots
          path: Packages/UI/Tests/**/__Snapshots__/**/*.png
          if-no-files-found: error
          retention-days: 7
